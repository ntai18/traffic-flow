spring:
  application:
    name: traffic-flow






  cache:
    type: redis
  data:
    redis:
      port: 6379
      host: localhost


  datasource:
    url: jdbc:postgresql://localhost:5432/traffic_flow
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


